<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — stdy.io</title>
<link rel="icon" href="assets/stdy-logo.png">
<link rel="stylesheet" href="css/reset.css"><link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<header id="site-header"></header>
<main id="main">
  <div class="auth-wrap">
    <div class="auth-card animate-fade-up">
      <div class="brand"><span class="brand-mark"><img src="assets/stdy-logo.png" alt=""></span><span>stdy.io</span></div>
      <h1>Reset Your Password</h1>
      <p class="auth-sub">A demonstration flow — no real email is sent.</p>

      <form id="fpStep1" novalidate>
        <div class="form-group"><label for="fpEmail">Registered Email</label><input class="input" type="email" id="fpEmail" name="fpEmail" required><span class="form-error"></span></div>
        <button type="submit" class="btn btn-primary btn-block">Send Reset Code</button>
      </form>

      <form id="fpStep2" class="hidden" novalidate>
        <div class="demo-banner">This is a demonstration reset code (no email is sent):</div>
        <p class="text-center mb-4" style="font-size:1.8rem; font-weight:800; letter-spacing:4px;" id="demoCodeDisplay">000000</p>
        <div class="form-group"><label for="fpCode">Enter the Code Above</label><input class="input" id="fpCode" name="fpCode" required><span class="form-error"></span></div>
        <button type="submit" class="btn btn-primary btn-block">Verify Code</button>
      </form>

      <form id="fpStep3" class="hidden" novalidate>
        <div class="form-group"><label for="fpNewPassword">New Password</label><input class="input" type="password" id="fpNewPassword" name="fpNewPassword" required><span class="form-error"></span></div>
        <div class="form-group"><label for="fpConfirmPassword">Confirm New Password</label><input class="input" type="password" id="fpConfirmPassword" name="fpConfirmPassword" required><span class="form-error"></span></div>
        <button type="submit" class="btn btn-primary btn-block">Update Password</button>
      </form>

      <p class="auth-foot">Remembered your password? <a href="login.html">Log in</a></p>
    </div>
  </div>
</main>
<footer id="site-footer"></footer>

<script src="js/utils.js"></script>
<script src="js/database.js"></script>
<script src="js/validation.js"></script>
<script src="js/notifications.js"></script>
<script src="js/auth.js"></script>
<script src="js/courses.js"></script>
<script src="js/enrollment.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/learning.js"></script>
<script src="js/forum.js"></script>
<script src="js/checkout.js"></script>
<script src="js/profile.js"></script>
<script src="js/instructor.js"></script>
<script src="js/admin.js"></script>
<script src="js/app.js"></script>
<script>
  StdyApp.init('');
  Auth.initForgotPasswordPage();
</script>
</body>
</html>
