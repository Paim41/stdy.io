<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us — stdy.io</title>
<link rel="icon" href="assets/stdy-logo.png">
<link rel="stylesheet" href="css/reset.css"><link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<header id="site-header"></header>
<main id="main">
  <div class="page-head container">
    <nav class="breadcrumb"><a href="index.html">Home</a> / <span>Contact</span></nav>
    <h1>Get In Touch</h1>
    <p>Have a question about a course or your account? Send us a message.</p>
  </div>
  <div class="container">
    <div class="grid" style="grid-template-columns:1fr 1fr; gap:24px; align-items:start;">
      <div class="panel">
        <h3>Send a Message</h3>
        <form id="contactForm" class="mt-4" novalidate>
          <div class="form-group"><label for="cName">Full Name</label><input class="input" id="cName" required><span class="form-error"></span></div>
          <div class="form-group"><label for="cEmail">Email</label><input class="input" type="email" id="cEmail" required><span class="form-error"></span></div>
          <div class="form-group"><label for="cMessage">Message</label><textarea class="input" id="cMessage" rows="4" required></textarea><span class="form-error"></span></div>
          <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
      </div>
      <div class="panel">
        <h3>Contact Information</h3>
        <div class="flex items-center gap-3 mt-4"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:22px;height:22px; color:var(--primary);"><rect x="3" y="5" width="18" height="14" rx="2"/><path stroke-linecap="round" stroke-linejoin="round" d="M3 6.5l9 6.5 9-6.5"/></svg><span>support@stdy.io</span></div>
        <div class="flex items-center gap-3 mt-3"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:22px;height:22px; color:var(--primary);"><path stroke-linecap="round" stroke-linejoin="round" d="M4 5c0 8.5 6.5 15 15 15l3-4-6-3-2 2c-2-1-4.5-3.5-5.5-5.5l2-2-3-6z"/></svg><span>+60 3-1234 5678 (demo)</span></div>
        <div class="flex items-center gap-3 mt-3"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:22px;height:22px; color:var(--primary);"><circle cx="12" cy="12" r="9"/><path stroke-linecap="round" d="M3 12h18M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/></svg><span>Johor Bahru, Malaysia (demo address)</span></div>
        <p class="muted mt-4" style="font-size:0.85rem;">This is a demonstration project. No messages sent here are delivered to a real inbox.</p>
      </div>
    </div>
  </div>
</main>
<footer id="site-footer"></footer>

<script src="js/utils.js"></script>
<script src="js/database.js"></script>
<script src="js/validation.js"></script>
<script src="js/notifications.js"></script>
<script src="js/auth.js"></script>
<script src="js/courses.js"></script>
<script src="js/enrollment.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/learning.js"></script>
<script src="js/forum.js"></script>
<script src="js/checkout.js"></script>
<script src="js/profile.js"></script>
<script src="js/instructor.js"></script>
<script src="js/admin.js"></script>
<script src="js/app.js"></script>
<script>
  StdyApp.init('');
  document.getElementById('contactForm').addEventListener('submit', (e) => {
    e.preventDefault();
    ['cName','cEmail','cMessage'].forEach(clearFieldError);
    const name = document.getElementById('cName').value.trim();
    const email = document.getElementById('cEmail').value.trim();
    const message = document.getElementById('cMessage').value.trim();
    let valid = true;
    if (Validate.required(name, 'Name')) { setFieldError('cName', 'Name is required.'); valid = false; }
    const emailErr = Validate.required(email, 'Email') || Validate.email(email);
    if (emailErr) { setFieldError('cEmail', emailErr); valid = false; }
    if (Validate.required(message, 'Message')) { setFieldError('cMessage', 'Message is required.'); valid = false; }
    if (!valid) return;
    showToast('Thanks for reaching out! (Demonstration only — no message was actually sent.)', 'success');
    document.getElementById('contactForm').reset();
  });
</script>
</body>
</html>
