<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard — stdy.io</title>
<link rel="icon" href="assets/stdy-logo.png">
<link rel="stylesheet" href="css/reset.css"><link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<header id="site-header"></header>
<main id="main">
  <div class="page-head container">
    <h1>Welcome back, <span id="welcomeName">Student</span>!</h1>
    <p>Here's a snapshot of your learning journey.</p>
  </div>
  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" data-tab="overview">Overview</button>
      <button class="tab-btn" data-tab="tracker">Progress Tracker</button>
    </div>

    <div data-tab-panel="overview">
      <div class="bento" id="summaryCards"></div>

      <div class="grid" style="grid-template-columns:1.6fr 1fr; gap:24px; margin-top:24px; align-items:start;">
        <div class="panel"><div class="panel-head"><h3>Continue Learning</h3><a href="courses.html" class="btn btn-ghost btn-sm">Browse More</a></div>
          <div id="continueLearningList"></div></div>
        <div class="panel"><h3>Progress Overview</h3><div id="progressChartMount" class="mt-4"></div></div>
      </div>

      <div class="grid" style="grid-template-columns:1fr 1fr; gap:24px; margin-top:24px; align-items:start;">
        <div class="panel"><h3>Upcoming Learning Tasks</h3><div id="upcomingTasks" class="mt-3"></div></div>
        <div class="panel"><h3>Recent Achievements</h3><div id="achievementsList" class="mt-3"></div></div>
      </div>

      <div class="panel mt-6"><div class="panel-head"><h3>Recommended For You</h3></div>
        <div class="grid grid-courses" id="recommendedCourses"></div></div>

      <div class="panel mt-6"><div class="panel-head"><h3>Notifications</h3><span class="muted" style="font-size:0.82rem;">Use the bell icon above for full history</span></div>
        <div id="notifPreview"></div></div>
    </div>

    <div data-tab-panel="tracker" class="hidden">
      <div class="tabs">
        <button class="tab-btn active" data-tracker-filter="all">All Courses</button>
        <button class="tab-btn" data-tracker-filter="not-started">Not Started</button>
        <button class="tab-btn" data-tracker-filter="in-progress">In Progress</button>
        <button class="tab-btn" data-tracker-filter="completed">Completed</button>
      </div>
      <div id="trackerMount"></div>
    </div>
  </div>
</main>
<footer id="site-footer"></footer>

<script src="js/utils.js"></script>
<script src="js/database.js"></script>
<script src="js/validation.js"></script>
<script src="js/notifications.js"></script>
<script src="js/auth.js"></script>
<script src="js/courses.js"></script>
<script src="js/enrollment.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/learning.js"></script>
<script src="js/forum.js"></script>
<script src="js/checkout.js"></script>
<script src="js/profile.js"></script>
<script src="js/instructor.js"></script>
<script src="js/admin.js"></script>
<script src="js/app.js"></script>
<script>
  StdyApp.init('mylearning');
  initDashboardPage();
  document.querySelectorAll('[data-tracker-filter]').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('[data-tracker-filter]').forEach(b => b.classList.toggle('active', b === btn));
    renderProgressTracker(getCurrentUser(), btn.dataset.trackerFilter);
  }));
</script>
</body>
</html>
