<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Forum — stdy.io</title>
<link rel="icon" href="assets/stdy-logo.png">
<link rel="stylesheet" href="css/reset.css"><link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<header id="site-header"></header>
<main id="main">
  <div class="page-head container">
    <nav class="breadcrumb"><a href="index.html">Home</a> / <span>Community</span></nav>
    <div class="flex justify-between items-center" style="flex-wrap:wrap; gap:12px;">
      <div><h1>Community Forum</h1><p id="threadCount">Discussions</p></div>
      <button class="btn btn-primary" id="newThreadBtn">New Discussion</button>
    </div>
  </div>

  <div class="container">
    <div id="forumListView">
      <div class="tabs">
        <button class="tab-btn active" data-forum-tab="all">All</button>
        <button class="tab-btn" data-forum-tab="questions">Questions</button>
        <button class="tab-btn" data-forum-tab="tips">Study Tips</button>
        <button class="tab-btn" data-forum-tab="announcements">Announcements</button>
        <button class="tab-btn" data-forum-tab="popular">Popular</button>
        <button class="tab-btn" data-forum-tab="unanswered">Unanswered</button>
      </div>
      <div class="catalog-toolbar">
        <div class="hero-search" style="max-width:320px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="M21 21l-4.3-4.3"/></svg>
          <input type="search" id="forumSearchInput" placeholder="Search discussions…" aria-label="Search discussions">
        </div>
        <select class="input" id="forumCourseFilter" style="max-width:240px;"></select>
      </div>
      <div id="threadListMount"></div>
    </div>

    <div id="forumDetailView" class="hidden"><div id="threadDetailMount"></div></div>
  </div>
</main>
<footer id="site-footer"></footer>

<script src="js/utils.js"></script>
<script src="js/database.js"></script>
<script src="js/validation.js"></script>
<script src="js/notifications.js"></script>
<script src="js/auth.js"></script>
<script src="js/courses.js"></script>
<script src="js/enrollment.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/learning.js"></script>
<script src="js/forum.js"></script>
<script src="js/checkout.js"></script>
<script src="js/profile.js"></script>
<script src="js/instructor.js"></script>
<script src="js/admin.js"></script>
<script src="js/app.js"></script>
<script>
  StdyApp.init('community');
  initForumPage();
</script>
</body>
</html>
