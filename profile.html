<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — stdy.io</title>
<link rel="icon" href="assets/stdy-logo.png">
<link rel="stylesheet" href="css/reset.css"><link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<header id="site-header"></header>
<main id="main">
  <div class="page-head container"><h1>My Profile</h1></div>
  <div class="container">
    <div class="grid" style="grid-template-columns:1fr 2fr; gap:24px; align-items:start;">
      <div>
        <div class="panel text-center">
          <div class="avatar-badge" id="profileAvatarBig" style="width:96px; height:96px; font-size:2rem; margin:0 auto 16px;"></div>
          <div id="profileStats" class="flex-col gap-2 mt-4" style="text-align:left;"></div>
          <button class="btn btn-secondary btn-block mt-4" id="profileLogoutBtn">Log Out</button>
        </div>
      </div>
      <div>
        <div class="panel">
          <h3>Profile Details</h3>
          <form id="profileForm" class="mt-4" novalidate>
            <div class="form-row">
              <div class="form-group"><label for="pName">Full Name</label><input class="input" id="pName" name="pName" required><span class="form-error"></span></div>
              <div class="form-group"><label for="pEmail">Email</label><input class="input" type="email" id="pEmail" name="pEmail" required><span class="form-error"></span></div>
            </div>
            <div class="form-group"><label for="pBio">Short Biography</label><textarea class="input" id="pBio" name="pBio" rows="3"></textarea></div>
            <div class="form-row">
              <div class="form-group"><label for="pInterest">Learning Interest</label><select class="input" id="pInterest" name="pInterest">
                <option>Web Development</option><option>Programming</option><option>UI and UX Design</option><option>Data Science</option><option>Cybersecurity</option><option>Digital Marketing</option><option>Cloud Computing</option></select></div>
              <div class="form-group"><label for="pDifficulty">Preferred Difficulty</label><select class="input" id="pDifficulty" name="pDifficulty">
                <option>Beginner</option><option>Intermediate</option><option>Advanced</option></select></div>
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </form>
        </div>

        <div class="panel mt-6">
          <h3>Change Password</h3>
          <form id="passwordForm" class="mt-4" novalidate>
            <div class="form-group"><label for="pCurrentPassword">Current Password</label><input class="input" type="password" id="pCurrentPassword" name="pCurrentPassword" required><span class="form-error"></span></div>
            <div class="form-row">
              <div class="form-group"><label for="pNewPassword">New Password</label><input class="input" type="password" id="pNewPassword" name="pNewPassword" required><span class="form-error"></span></div>
              <div class="form-group"><label for="pConfirmPassword">Confirm New Password</label><input class="input" type="password" id="pConfirmPassword" name="pConfirmPassword" required><span class="form-error"></span></div>
            </div>
            <button type="submit" class="btn btn-secondary">Change Password</button>
          </form>
        </div>

        <div class="panel mt-6">
          <h3>Payment History</h3>
          <div id="paymentHistory" class="mt-4"></div>
        </div>
      </div>
    </div>
  </div>
</main>
<footer id="site-footer"></footer>

<script src="js/utils.js"></script>
<script src="js/database.js"></script>
<script src="js/validation.js"></script>
<script src="js/notifications.js"></script>
<script src="js/auth.js"></script>
<script src="js/courses.js"></script>
<script src="js/enrollment.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/learning.js"></script>
<script src="js/forum.js"></script>
<script src="js/checkout.js"></script>
<script src="js/profile.js"></script>
<script src="js/instructor.js"></script>
<script src="js/admin.js"></script>
<script src="js/app.js"></script>
<script>
  StdyApp.init('profile');
  initProfilePage();
</script>
</body>
</html>
