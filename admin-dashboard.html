<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administrator Dashboard — stdy.io</title>
<link rel="icon" href="assets/stdy-logo.png">
<link rel="stylesheet" href="css/reset.css"><link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<header id="site-header"></header>
<main id="main">
  <div class="page-head container">
    <div class="flex justify-between items-center" style="flex-wrap:wrap; gap:12px;">
      <div><h1>Administrator Dashboard</h1><p>Welcome back, <span id="adminName">Admin</span>. Here is the platform overview.</p></div>
      <button class="btn btn-danger" id="resetDemoDataBtn">Reset Demo Data</button>
    </div>
  </div>
  <div class="container">
    <div class="bento" id="adminStats"></div>

    <div class="tabs mt-6">
      <button class="tab-btn active" data-admin-tab="overview">Overview</button>
      <button class="tab-btn" data-admin-tab="users">Users</button>
      <button class="tab-btn" data-admin-tab="courses">Courses</button>
      <button class="tab-btn" data-admin-tab="payments">Payments</button>
      <button class="tab-btn" data-admin-tab="discussions">Discussions</button>
      <button class="tab-btn" data-admin-tab="testimonials">Testimonials</button>
    </div>

    <div data-admin-panel="overview"><div class="panel"><h3>Platform Snapshot</h3><p class="mt-3">Use the tabs above to manage users, courses, payments, discussion reports and homepage testimonials. All data lives in your browser's LocalStorage as part of this demonstration.</p></div></div>
    <div data-admin-panel="users" class="hidden"><div class="panel" id="adminUsersMount"></div></div>
    <div data-admin-panel="courses" class="hidden"><div class="panel" id="adminCoursesMount"></div></div>
    <div data-admin-panel="payments" class="hidden"><div class="panel" id="adminPaymentsMount"></div></div>
    <div data-admin-panel="discussions" class="hidden"><div class="panel" id="adminDiscussionsMount"></div></div>
    <div data-admin-panel="testimonials" class="hidden"><div class="panel" id="adminTestimonialsMount"></div></div>
  </div>
</main>
<footer id="site-footer"></footer>

<script src="js/utils.js"></script>
<script src="js/database.js"></script>
<script src="js/validation.js"></script>
<script src="js/notifications.js"></script>
<script src="js/auth.js"></script>
<script src="js/courses.js"></script>
<script src="js/enrollment.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/learning.js"></script>
<script src="js/forum.js"></script>
<script src="js/checkout.js"></script>
<script src="js/profile.js"></script>
<script src="js/instructor.js"></script>
<script src="js/admin.js"></script>
<script src="js/app.js"></script>
<script>
  StdyApp.init('');
  initAdminDashboardPage();
</script>
</body>
</html>
