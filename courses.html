<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Courses — stdy.io</title>
<link rel="icon" href="assets/stdy-logo.png">
<link rel="stylesheet" href="css/reset.css"><link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<header id="site-header"></header>
<main id="main">
  <div class="page-head container">
    <nav class="breadcrumb"><a href="index.html">Home</a> / <span>Courses</span></nav>
    <h1>Browse Courses</h1>
    <p>Explore <span id="resultCount">courses</span> across web development, design, data, security and more.</p>
  </div>

  <div class="container">
    <div class="catalog-layout">
      <aside class="filter-panel" id="filterPanel" aria-label="Course filters"></aside>

      <div>
        <div class="catalog-toolbar">
          <div class="hero-search" style="max-width:360px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="M21 21l-4.3-4.3"/></svg>
            <input type="search" id="catalogSearchInput" placeholder="Search courses…" aria-label="Search courses">
          </div>
          <button class="btn btn-secondary mobile-filter-btn" id="mobileFilterBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" d="M4 6h16M7 12h10M10 18h4"/></svg>Filter Courses</button>
          <select class="input" id="sortSelect" style="max-width:220px;">
            <option value="popularity">Sort: Popularity</option>
            <option value="rating">Sort: Rating</option>
            <option value="newest">Sort: Newest</option>
            <option value="price-low">Sort: Price Low to High</option>
            <option value="price-high">Sort: Price High to Low</option>
          </select>
          <div class="view-toggle">
            <button data-view="grid" class="active" aria-label="Grid view"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></button>
            <button data-view="list" aria-label="List view"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg></button>
          </div>
        </div>
        <div class="filter-chips" id="activeFilterChips"></div>
        <div class="grid grid-courses" id="courseGrid"></div>
        <div class="pagination" id="catalogPagination"></div>
      </div>
    </div>
  </div>
</main>
<footer id="site-footer"></footer>

<script src="js/utils.js"></script>
<script src="js/database.js"></script>
<script src="js/validation.js"></script>
<script src="js/notifications.js"></script>
<script src="js/auth.js"></script>
<script src="js/courses.js"></script>
<script src="js/enrollment.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/learning.js"></script>
<script src="js/forum.js"></script>
<script src="js/checkout.js"></script>
<script src="js/profile.js"></script>
<script src="js/instructor.js"></script>
<script src="js/admin.js"></script>
<script src="js/app.js"></script>
<script>
  StdyApp.init('courses');
  initCoursesPage();
</script>
</body>
</html>
